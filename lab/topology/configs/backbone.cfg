hostname backbone
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   no switchport
   ip address 10.0.12.1/30
   description to-site1-spine
   ip ospf network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.0.13.1/30
   description to-site2-spine
   ip ospf network point-to-point
!
ip routing
!
router ospf 1
   router-id 1.1.1.1
   network 1.1.1.1/32 area 0
   network 10.0.12.0/30 area 0
   network 10.0.13.0/30 area 0
!
management api http-commands
   no shutdown
!
end