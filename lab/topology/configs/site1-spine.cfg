hostname site1-spine
!
interface Loopback0
   ip address 1.1.1.2/32
!
interface Ethernet1
   no switchport
   ip address 10.0.12.2/30
   description to-backbone
   ip ospf network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.1.10.1/30
   description to-site1-tgt-a
   ip ospf network point-to-point
!
interface Ethernet3
   no switchport
   ip address 10.1.20.1/30
   description to-site1-tgt-b
   ip ospf network point-to-point
!
interface Ethernet4
   no switchport
   ip address 10.1.30.1/24
   description to-scanner1
!
ip routing
!
router ospf 1
   router-id 1.1.1.2
   network 1.1.1.2/32 area 0
   network 10.0.12.0/30 area 0
   network 10.1.10.0/30 area 0
   network 10.1.20.0/30 area 0
   network 10.1.30.0/24 area 0
!
management api http-commands
   no shutdown
!
end