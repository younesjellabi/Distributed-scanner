hostname site1-tgt-b
!
interface Loopback0
   ip address 10.1.100.2/32
!
interface Ethernet1
   no switchport
   ip address 10.1.20.2/30
   description to-site1-spine
   ip ospf network point-to-point
!
ip routing
!
router ospf 1
   router-id 10.1.100.2
   network 10.1.100.2/32 area 0
   network 10.1.20.0/30 area 0
!
management api http-commands
   no shutdown
!
end