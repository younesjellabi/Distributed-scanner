hostname site2-spine
!
interface Loopback0
   ip address 1.1.1.3/32
!
interface Ethernet1
   no switchport
   ip address 10.0.13.2/30
   description to-backbone
   ip ospf network point-to-point
!
interface Ethernet2
   no switchport
   ip address 10.2.10.1/30
   description to-site2-tgt-a
   ip ospf network point-to-point
!
interface Ethernet3
   no switchport
   ip address 10.2.20.1/30
   description to-site2-tgt-b
   ip ospf network point-to-point
!
ip routing
!
router ospf 1
   router-id 1.1.1.3
   network 1.1.1.3/32 area 0
   network 10.0.13.0/30 area 0
   network 10.2.10.0/30 area 0
   network 10.2.20.0/30 area 0
!
management api http-commands
   no shutdown
!
end