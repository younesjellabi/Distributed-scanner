! cEOS startup config for Phase 1 Step 3
!
hostname site1-eos
!
interface Ethernet1
   no switchport
   ip address 10.10.10.1/24
   description to-scanner
!
interface Ethernet2
   no switchport
   ip address 10.20.20.1/24
   description to-target-a
!
interface Ethernet3
   no switchport
   ip address 10.30.30.1/24
   description to-collector
!
ip routing
!
management api http-commands
   no shutdown
!
end